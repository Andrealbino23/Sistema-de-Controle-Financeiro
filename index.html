<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Controle Financeiro</h1>

        <form id="formReceita">

            <input
                type="text"
                id="descricao"
                placeholder="Descrição"
                required
            >

            <input
                type="number"
                id="valor"
                placeholder="Valor"
                required
            >

            <select id="categoria">

                <option>Salário</option>
                <option>Freelance</option>
                <option>Investimentos</option>
                <option>Venda</option>
                <option>Outros</option>

            </select>

            <input
                type="date"
                id="data"
                required
            >

            <button type="submit">
                Cadastrar Receita
            </button>

        </form>

        <hr>

        <h2>Saldo Total</h2>

        <h3 id="saldo">
            R$ 0,00
        </h3>

        <hr>

        <h2>Receitas</h2>

        <div id="listaReceitas">

        </div>

    </div>

<script src="script.js"></script>

</body>
</html>
